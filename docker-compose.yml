services:
  simulation:
    build:
      context: ./simulation
    image: arb-contest/simulation:dev
    container_name: arb-simulation
    network_mode: host
    cpuset: "0-3"
    stop_grace_period: 10s
    init: true
    environment:
      RUST_LOG: ${RUST_LOG:?RUST_LOG must be set}
      SIM_HTTP_BIND: ${SIM_HTTP_BIND:?SIM_HTTP_BIND must be set}
      SIM_UDP_TARGET: ${SIM_UDP_TARGET:?SIM_UDP_TARGET must be set}
      SIM_TCP_BIND: ${SIM_TCP_BIND:?SIM_TCP_BIND must be set}
      SIM_EXPECTED_CONTESTANTS: ${SIM_EXPECTED_CONTESTANTS:?SIM_EXPECTED_CONTESTANTS must be set}
      SIM_INITIAL_BALANCE_USD: ${SIM_INITIAL_BALANCE_USD:?SIM_INITIAL_BALANCE_USD must be set}
      SEED: ${SEED:?SEED must be set}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9003/health"]
      interval: 1s
      timeout: 1s
      retries: 60
      start_period: 90s

  example-bot:
    build:
      context: ./contestants/example-bot
    image: arb-contest/example-bot:dev
    container_name: arb-example-bot
    network_mode: host
    cpuset: ${EXAMPLE_BOT_CPUSET:?EXAMPLE_BOT_CPUSET must be set}
    stop_grace_period: 10s
    init: true
    depends_on:
      simulation:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:?RUST_LOG must be set}
      SIM_HTTP_ADDR: ${SIM_HTTP_ADDR:?SIM_HTTP_ADDR must be set}
      SIM_UDP_GROUP: ${SIM_UDP_GROUP:?SIM_UDP_GROUP must be set}
      SIM_SUBMISSION_ADDR: ${SIM_SUBMISSION_ADDR:?SIM_SUBMISSION_ADDR must be set}
      SIM_INITIAL_BALANCE_USD: ${SIM_INITIAL_BALANCE_USD:?SIM_INITIAL_BALANCE_USD must be set}
